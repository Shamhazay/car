<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тюнинг Фургона</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0d1117;
        }

        .container {
            position: relative;
            /* Контейнер строго по размеру картинки */
            width: fit-content; 
            cursor: pointer;
            line-height: 0;
        }

        /* 1. Оригинальное фото (car.jpg) */
        .base-car {
            max-width: 900px;
            height: auto;
            display: block;
        }

        /* 2. Слой с цветом (трафарет) */
        .color-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            /* Используем маску как форму для заливки */
            -webkit-mask-image: url('mask.png');
            mask-image: url('mask.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;

            /* Чтобы белый кузов не мешал, закрашиваем его плотно */
            background-color: transparent;
            transition: background-color 0.3s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container" onclick="nextColor()">
        <img class="base-car" src="car.jpg">
        
        <div id="paintLayer" class="color-overlay"></div>
    </div>

    <script>
        function nextColor() {
            const layer = document.getElementById('paintLayer');
            
            // Генерируем любой цвет
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            
            layer.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        }
        
        // Красим сразу при загрузке
        window.onload = nextColor;
    </script>

</body>
</html>
